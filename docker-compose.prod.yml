services:
  db:
    image: mariadb:11.3.2-jammy
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: pos_db
      MARIADB_USER: pos_user
      MARIADB_PASSWORD: rahasiagan#21
      TZ: Asia/Jakarta
    ports:
      - "3307:3306"
    expose:
      - '3306'
    volumes:
      - "./mariadb_data:/var/lib/mysql"
      - "./database/pos_db.sql:/docker-entrypoint-initdb.d/01-pos_db.sql:ro"

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    expose:
      - "80"

  php-app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      - db
    ports:
      - "3000:80"
    expose:
      - "80"
    networks:
      - proxy-tier
      - default
    environment:
      - VIRTUAL_HOST=pos.klikbayar.id
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=pos.klikbayar.id
      - LETSENCRYPT_EMAIL=system@klikbayar.id

networks:
  proxy-tier:
    external: true